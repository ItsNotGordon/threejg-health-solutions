kind: native
name: triage_router_agent
display_name: triage router
description:
  routes patients to the correct intake workflow based on visit type, then
  verifies insurance.
context_access_enabled: true
context_variables: []
restrictions: editable
llm: groq/openai/gpt-oss-120b
style: default
hide_reasoning: false
instructions: |-
  You are a triage router for a healthcare clinic front desk. Your name is Apollo
  You MUST delegate all work to your collaborator agents. The collaborator agents will ask for information, you are a relay you collect the information from the customer the collaborator fills out the form.
  After you are triggered to delegate respond exactly like the agent you delegate to.

  Delegation rules:
  1. Ask the patient why they are here today.
  2. If the patient describes a workplace injury, workers compensation claim, employer-directed physical,
     drug testing, or any occupational health matter, delegate to **occupational_health_Agent_7688qz**.
  3. If the patient describes acute symptoms, illness, injury NOT related to work, walk-in medical needs,
     or any situation requiring immediate non-emergency medical attention, delegate to **Urgent_Care_Intake_5198eo**.
  4. If the patient's response is ambiguous, ask one clarifying question:
    "Is this visit related to a workplace injury or personal health matter?"
  5. After the intake agent has finished collecting all required patient information,
     delegate to **agent_Insurance_Eligibility_and_Verification__51871W** to verify insurance coverage.

  Important:

  - Do NOT skip the insurance verification step after intake is complete.
  - If the patient communicates in a language other than English, respond in that same language
    and include "the patient is speaking [language], please continue in [language]" when delegating.
guidelines: []
collaborators:
  - Urgent_Care_Intake_5198eo
  - occupational_health_Agent_7688qz
  - agent_Insurance_Eligibility_and_Verification__51871W
tools:
  - Agentic_workflow_1494bM
toolkits: []
plugins:
  agent_pre_invoke: []
  agent_post_invoke: []
knowledge_base: []
chat_with_docs:
  enabled: false
  supports_full_document: true
  vector_index:
    chunk_size: 400
    chunk_overlap: 50
    limit: 10
    extraction_strategy: express
  generation:
    prompt_instruction: ""
    max_docs_passed_to_llm: 5
    generated_response_length: Moderate
    display_text_no_results_found:
      I searched my knowledge base, but did not find
      anything related to your query
    display_text_connectivity_issue:
      I might have information related to your query
      to share, but am unable to connect to my knowledge base at the moment
    idk_message: I'm afraid I don't understand. Please rephrase your question.
    enabled: false
  query_rewrite:
    enabled: true
  confidence_thresholds:
    retrieval_confidence_threshold: Lowest
    response_confidence_threshold: Lowest
  citations:
    citation_title: How do we know?
    citations_shown: -1
  hap_filtering:
    output:
      enabled: false
      threshold: 0.5
  query_source: Agent
  agent_query_description: The query to search for in the knowledge base
starter_prompts:
  is_default_prompts: false
  prompts:
    - id: default0
      title: What can you do for me?
      subtitle: Learn about watsonx Orchestrate AI Agent and Gen AI capabilities
      prompt: Summarize the capabilities of watsonx Orchestrate.
      state: active
    - id: default1
      title: Formalize Message
      subtitle: Craft more professional messages
      prompt:
        Please revise the text in the following prompt to improve clarity and
        brevity, while preserving all essential information.
      state: active
    - id: default2
      title: Summarize Meeting Notes
      subtitle: Bullet key points from meeting notes
      prompt:
        Create a bulleted summary highlighting key points from the meeting notes
        sent in the next prompt.
      state: active
welcome_content:
  welcome_message: Hello, welcome to watsonx Orchestrate
  description: Accuracy of generated answers may vary. Please double-check responses.
  is_default_message: false
spec_version: v1
