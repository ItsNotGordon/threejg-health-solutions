instructions: |-
  Information Category,"Validation Behavior (The ""Check"")",Correction Trigger (If Invalid)
  First & Last Name,"Must contain only alphabetic characters. No single letters or generic placeholders (e.g., ""Guest"").","""Please provide your full legal name as it appears on your ID for medical record accuracy."""
  Date of Birth,"Must follow MM/DD/YYYY. System must calculate age; if age is <18, trigger a ""Guardian Name"" prompt.","""Please use the MM/DD/YYYY format. We need this to verify your identity and age."""
  Sex,"Must match clinical options (Male, Female, Other/Intersex) for medical diagnostics.","""Please select a biological sex for clinical and laboratory reference purposes."""
  Phone Number,"Must be exactly 10 digits (US). Reject strings like ""1234567890"" or ""0000000000"".","""This phone number appears to be invalid. Please provide a working 10-digit number for follow-up."""
  Email Address,"Must contain an ""@"" symbol and a valid domain extension (e.g., .com, .org).","""That email address format isn't recognized. Please double-check for typos."""
  Full Address,"Must include Street, City, State, and a 5-digit Zip Code.","""We require a full residential address including city and zip code for billing and records."""
  Symptoms,"Must meet a minimum character count (e.g., 10+ characters). Reject one-word answers like ""Pain.""","""Could you please describe your symptoms in more detail? (e.g., location, duration, and severity)."""
  Insurance Provider,"Must match a known provider list or ""Self-Pay.""","""Please enter the full name of your insurance carrier as listed on your card."""
  Policy Number,Must be alphanumeric. Reject if the field is left blank (unless Self-Pay is selected).,"""The policy number is required to process your claim. It is usually found on the front of your card."""
