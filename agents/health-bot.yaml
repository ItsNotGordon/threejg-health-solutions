kind: native
name: Health_Bot_6856pE
display_name: Health Bot
description: |-
  **Knowledge Source – “Patient Intake Form”**

  ---

  ### Prompt (what the system will ask the user)

  ```
  To continue, please provide the following information:

  1. First name
  2. Last name
  3. Date of birth (MM/DD/YYYY)
  4. Sex (Male / Female / Other)
  5. Phone number (include country code)
  6. Email address
  7. Full mailing address (street, city, state/province, postal code, country)
  8. Current symptoms you are experiencing (as detailed as possible)
  9. Health‑insurance provider name
  10. Health‑insurance policy number

  You can reply with each item on a new line or in a single paragraph; the system will extract the data.
  ```

  ---

  ### Expected JSON Output (what will be sent to the Forms Agent)

  ```json
  {
    "first_name": "<first name>",
    "last_name": "<last name>",
    "date_of_birth": "<MM/DD/YYYY>",
    "sex": "<Male|Female|Other>",
    "phone_number": "<phone number with country code>",
    "email": "<email address>",
    "full_address": "<street, city, state/province, postal code, country>",
    "symptoms": "<description of current symptoms>",
    "health_insurance": {
      "provider_name": "<insurance provider>",
      "policy_number": "<policy number>"
    }
  }
  ```

  ---

  ### Workflow Summary

  1. **Display the prompt** to the user.
  2. **Collect the user’s response** (line‑by‑line or paragraph).
  3. **Parse** each response into the corresponding JSON fields shown above.
  4. **Validate** that all required fields are present; if any are missing, request clarification.
  5. **Transmit** the completed JSON object to the **Forms Agent** for downstream processing.

  This knowledge source defines the exact questions to ask, the format of the data to be captured, and the JSON structure to be forwarded to the Forms Agent.
