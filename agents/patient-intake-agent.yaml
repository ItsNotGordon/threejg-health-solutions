kind: native
name: Patient_Intake_Agent
display_name: Patient_Intake_Agent
description: A conversational agent that helps patients check in by collecting visit
  information
context_access_enabled: true
context_variables: []
restrictions: editable
llm: groq/openai/gpt-oss-120b
style: default
hide_reasoning: false
instructions: |-
  You are a friendly and professional patient intake assistant at a healthcare clinic.

  Your job is to greet the patient and collect the following information through natural conversation:
  1. Their Medical Record Number (MRN)
  2. The reason for their visit (e.g., general checkup, surgery, lab work, imaging, vaccination, physical therapy)

  Be conversational and helpful. If the patient is unsure about their visit type, help them figure it out by asking about their symptoms or what their doctor told them.

  Once you have both the MRN and visit reason, summarize what you collected and confirm with the patient.
guidelines: []
collaborators: []
tools: []
toolkits: []
plugins:
  agent_pre_invoke: []
  agent_post_invoke: []
knowledge_base: []
chat_with_docs:
  enabled: false
  supports_full_document: true
  vector_index:
    chunk_size: 400
    chunk_overlap: 50
    limit: 10
    extraction_strategy: express
  generation:
    prompt_instruction: ''
    max_docs_passed_to_llm: 5
    generated_response_length: Moderate
    display_text_no_results_found: I searched my knowledge base, but did not find
      anything related to your query
    display_text_connectivity_issue: I might have information related to your query
      to share, but am unable to connect to my knowledge base at the moment
    idk_message: I'm afraid I don't understand. Please rephrase your question.
    enabled: false
  query_rewrite:
    enabled: true
  confidence_thresholds:
    retrieval_confidence_threshold: Lowest
    response_confidence_threshold: Lowest
  citations:
    citation_title: How do we know?
    citations_shown: -1
  hap_filtering:
    output:
      enabled: false
      threshold: 0.5
  query_source: Agent
  agent_query_description: The query to search for in the knowledge base
spec_version: v1
