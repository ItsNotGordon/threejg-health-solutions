kind: native
name: occupational_health_Agent_7688qz
display_name: occupational health Agent
description:
  Collects occupational health and workers comp intake information from
  patients.
context_access_enabled: true
context_variables: []
restrictions: editable
supported_apps: []
llm: groq/openai/gpt-oss-120b
style: react
hide_reasoning: false
instructions: |-
  You are a friendly and professional occupational health intake specialist.

  Once invoked, immediately begin asking the patient questions. Do not wait for them to prompt you.
  Your job is to collect all required information from the patient for their workplace injury visit.
  Consult your knowledge base to determine which fields are required for the occupational health intake form.
  Ask the patient for the required information in small groups (3-4 fields at a time), not all at once.
  Validate each response according to the rules in your knowledge base.
  If a field is invalid, politely explain the issue and ask for a correction before moving on.
  If the patient communicates in a language other than English, respond in that same language.
  Once all required fields are collected and validated, summarize the information and confirm with the patient.
guidelines: []
collaborators: []
tools: []
toolkits: []
plugins:
  agent_pre_invoke: []
  agent_post_invoke: []
knowledge_base:
  - Occupational_Health_Workers_Comp_Intake_20687C
chat_with_docs:
  enabled: false
  supports_full_document: true
  vector_index:
    chunk_size: 400
    chunk_overlap: 50
    limit: 10
    extraction_strategy: express
  generation:
    prompt_instruction: ""
    max_docs_passed_to_llm: 5
    generated_response_length: Moderate
    display_text_no_results_found:
      I searched my knowledge base, but did not find
      anything related to your query
    display_text_connectivity_issue:
      I might have information related to your query
      to share, but am unable to connect to my knowledge base at the moment
    idk_message: I'm afraid I don't understand. Please rephrase your question.
    enabled: false
  query_rewrite:
    enabled: true
  confidence_thresholds:
    retrieval_confidence_threshold: Lowest
    response_confidence_threshold: Lowest
  citations:
    citation_title: How do we know?
    citations_shown: -1
  hap_filtering:
    output:
      enabled: false
      threshold: 0.5
  query_source: Agent
  agent_query_description: The query to search for in the knowledge base
starter_prompts:
  is_default_prompts: false
  prompts:
    - id: default0
      title: What can you do for me?
      subtitle: Learn about watsonx Orchestrate AI Agent and Gen AI capabilities
      prompt: Summarize the capabilities of watsonx Orchestrate.
      state: active
    - id: default1
      title: Formalize Message
      subtitle: Craft more professional messages
      prompt:
        Please revise the text in the following prompt to improve clarity and
        brevity, while preserving all essential information.
      state: active
    - id: default2
      title: Summarize Meeting Notes
      subtitle: Bullet key points from meeting notes
      prompt:
        Create a bulleted summary highlighting key points from the meeting notes
        sent in the next prompt.
      state: active
welcome_content:
  welcome_message: Hello, welcome to watsonx Orchestrate
  description: Accuracy of generated answers may vary. Please double-check responses.
  is_default_message: false
spec_version: v1
